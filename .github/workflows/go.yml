name: "Go build & tests"
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read
  pull-requests: read

jobs:
  check-changelog:
    runs-on: ubuntu-latest
    if: github.ref != 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check if CHANGELOG.md was updated
        run: |
          git fetch origin main
          if ! git diff --name-only origin/main HEAD | grep -q '^CHANGELOG.md$'; then
            echo "CHANGELOG.md was not updated compared to main. Please update the changelog."
            exit 1
          fi

  build:
    needs: check-changelog
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        go-version: ["1.26"]
    steps:
      - uses: actions/checkout@v5
      - name: Set up Go ${{ matrix.go-version }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install Wails system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libgtk-3-dev libwebkit2gtk-4.1-dev
      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm install
      - name: Build frontend
        working-directory: ./frontend
        run: npm run build
      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest
      - name: Verify dependencies
        run: |
          go mod tidy
          git diff --exit-code # Fails if go mod tidy changed anything
      - name: Build with Wails
        run: wails build -tags webkit2_41
      - name: Test with Race Detector
        run: go test -race -v ./...
      - name: Upload build artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: caspaw-cg-linux
          path: build/bin/caspaw-cg
          retention-days: 7

  golangci:
    needs: build
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: stable
      - name: Dummy frontend
        run: |
          mkdir 'frontend/dist/'
          touch 'frontend/dist/dummy'
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.2
          only-new-issues: true

  release:
    needs: [build, golangci]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Read version
        id: version
        run: echo "version=$(jq -r .info.productVersion wails.json)" >> "$GITHUB_OUTPUT"

      - name: Check if this version was already released
        id: check
        run: |
          if git ls-remote --tags origin "refs/tags/v${{ steps.version.outputs.version }}" | grep -q .; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Download build artifact
        if: steps.check.outputs.exists == 'false'
        uses: actions/download-artifact@v4
        with:
          name: caspaw-cg-linux
          path: dist

      - name: Promote Unreleased section in CHANGELOG.md
        if: steps.check.outputs.exists == 'false'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          DATE=$(date +%F)
          awk -v version="$VERSION" -v date="$DATE" '
            /^## \[Unreleased\]/ {
              print
              print ""
              print "## [" version "] - " date
              next
            }
            { print }
          ' CHANGELOG.md > CHANGELOG.md.tmp && mv CHANGELOG.md.tmp CHANGELOG.md

      - name: Extract release notes for this version
        if: steps.check.outputs.exists == 'false'
        run: |
          awk '/^## \[${{ steps.version.outputs.version }}\]/{flag=1;next}/^## \[/{flag=0}flag' CHANGELOG.md > release-notes.md

      - name: Commit CHANGELOG.md
        if: steps.check.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git commit -m "chore: release v${{ steps.version.outputs.version }} [skip ci]"
          git push origin HEAD:main

      - name: Package artifact
        if: steps.check.outputs.exists == 'false'
        run: |
          chmod +x dist/caspaw-cg
          tar -czf caspaw-cg-linux-amd64-v${{ steps.version.outputs.version }}.tar.gz -C dist caspaw-cg

      - name: Tag release
        if: steps.check.outputs.exists == 'false'
        run: |
          git tag "v${{ steps.version.outputs.version }}"
          git push origin "v${{ steps.version.outputs.version }}"

      - name: Create GitHub Release
        if: steps.check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.version.outputs.version }}"
          name: "v${{ steps.version.outputs.version }}"
          body_path: release-notes.md
          files: caspaw-cg-linux-amd64-v${{ steps.version.outputs.version }}.tar.gz
