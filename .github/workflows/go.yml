name: "Go build & tests"
on:
  push:
    branches: ["main", "release/**"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read
  pull-requests: read

jobs:
  check-changelog:
    runs-on: ubuntu-latest
    if: github.ref != 'refs/heads/main' && !startsWith(github.ref, 'refs/heads/release/')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check if CHANGELOG.md was updated
        run: |
          git fetch origin main

          OLD_VERSION=$(git show origin/main:wails.json | jq -r .info.productVersion)
          NEW_VERSION=$(jq -r .info.productVersion wails.json)
          if [ "$OLD_VERSION" != "$NEW_VERSION" ]; then
            echo "Version bump detected ($OLD_VERSION -> $NEW_VERSION); this is a release, skipping the changelog requirement."
            exit 0
          fi

          if ! git diff --name-only origin/main HEAD | grep -q '^CHANGELOG.md$'; then
            echo "CHANGELOG.md was not updated compared to main. Please update the changelog."
            exit 1
          fi

  check-release-readiness:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/heads/release/')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Require a version bump and a matching changelog entry
        run: |
          git fetch origin main

          OLD_VERSION=$(git show origin/main:wails.json | jq -r .info.productVersion)
          NEW_VERSION=$(jq -r .info.productVersion wails.json)
          HIGHEST=$(printf '%s\n%s\n' "$OLD_VERSION" "$NEW_VERSION" | sort -V | tail -n1)
          if [ "$NEW_VERSION" == "$OLD_VERSION" ] || [ "$HIGHEST" != "$NEW_VERSION" ]; then
            echo "::error::wails.json productVersion ($NEW_VERSION) must be higher than main's version ($OLD_VERSION) to cut a release."
            exit 1
          fi

          if ! git diff --name-only origin/main HEAD | grep -q '^CHANGELOG.md$'; then
            echo "::error::CHANGELOG.md was not updated on this release branch."
            exit 1
          fi

          if ! grep -q "^## \[$NEW_VERSION\]" CHANGELOG.md; then
            echo "::error::CHANGELOG.md must contain a '## [$NEW_VERSION]' heading with the release notes for this version."
            exit 1
          fi

  build:
    needs: [check-changelog, check-release-readiness]
    if: |
      always() &&
      (needs.check-changelog.result == 'success' || needs.check-changelog.result == 'skipped') &&
      (needs.check-release-readiness.result == 'success' || needs.check-release-readiness.result == 'skipped')
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        go-version: ["1.26"]
    steps:
      - uses: actions/checkout@v5
      - name: Set up Go ${{ matrix.go-version }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install Wails system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libgtk-3-dev libwebkit2gtk-4.1-dev
      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm install
      - name: Build frontend
        working-directory: ./frontend
        run: npm run build
      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest
      - name: Verify dependencies
        run: |
          go mod tidy
          git diff --exit-code # Fails if go mod tidy changed anything
      - name: Build with Wails
        run: wails build -tags webkit2_41
      - name: Test with Race Detector
        run: go test -race -v ./...
      - name: Upload build artifact
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/')
        uses: actions/upload-artifact@v4
        with:
          name: caspaw-cg-linux
          path: build/bin/caspaw-cg
          retention-days: 7

  golangci:
    needs: build
    if: always() && needs.build.result == 'success'
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: stable
      - name: Dummy frontend
        run: |
          mkdir 'frontend/dist/'
          touch 'frontend/dist/dummy'
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.2
          only-new-issues: true

  release:
    needs: [build, golangci]
    if: always() && needs.build.result == 'success' && needs.golangci.result == 'success' && startsWith(github.ref, 'refs/heads/release/')
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Read version
        id: version
        run: echo "version=$(jq -r .info.productVersion wails.json)" >> "$GITHUB_OUTPUT"

      - name: Check if this version was already released
        id: check
        run: |
          if git ls-remote --tags origin "refs/tags/v${{ steps.version.outputs.version }}" | grep -q .; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Download build artifact
        if: steps.check.outputs.exists == 'false'
        uses: actions/download-artifact@v4
        with:
          name: caspaw-cg-linux
          path: dist

      - name: Extract release notes for this version
        run: |
          awk '/^## \[${{ steps.version.outputs.version }}\]/{flag=1;next}/^## \[/{flag=0}flag' CHANGELOG.md > release-notes.md

      - name: Package artifact
        if: steps.check.outputs.exists == 'false'
        run: |
          chmod +x dist/caspaw-cg
          tar -czf caspaw-cg-linux-amd64-v${{ steps.version.outputs.version }}.tar.gz -C dist caspaw-cg

      - name: Tag release
        if: steps.check.outputs.exists == 'false'
        run: |
          git tag "v${{ steps.version.outputs.version }}"
          git push origin "v${{ steps.version.outputs.version }}"

      - name: Create GitHub Release
        if: steps.check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.version.outputs.version }}"
          name: "v${{ steps.version.outputs.version }}"
          body_path: release-notes.md
          files: caspaw-cg-linux-amd64-v${{ steps.version.outputs.version }}.tar.gz

      - name: Open PR to merge release branch into main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -z "$(gh pr list --base main --head "${{ github.ref_name }}" --state open --json number --jq '.[0].number')" ]; then
            gh pr create --base main --head "${{ github.ref_name }}" \
              --title "Release v${{ steps.version.outputs.version }}" \
              --body-file release-notes.md
          fi
