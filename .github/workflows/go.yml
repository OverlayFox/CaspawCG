name: "Go build & tests"
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read
  pull-requests: read

jobs:
  check-changelog:
    runs-on: ubuntu-latest
    if: github.ref != 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check if CHANGELOG.md was updated
        run: |
          git fetch origin main
          if ! git diff --name-only origin/main HEAD | grep -q '^CHANGELOG.md$'; then
            echo "CHANGELOG.md was not updated compared to main. Please update the changelog."
            exit 1
          fi

  build:
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        go-version: ["1.26"]
    steps:
      - uses: actions/checkout@v5
      - name: Set up Go ${{ matrix.go-version }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install Wails system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libgtk-3-dev libwebkit2gtk-4.0-dev
      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm install
      - name: Build frontend
        working-directory: ./frontend
        run: npm run build
      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest
      - name: Verify dependencies
        run: |
          go mod tidy
          git diff --exit-code # Fails if go mod tidy changed anything
      - name: Build with Wails
        run: wails build
      - name: Test with Race Detector
        run: go test -race -v ./...

  golangci:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: stable
      - name: Dummy frontend
        run: |
          mkdir 'frontend/dist/'
          touch 'frontend/dist/dummy'
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.2
          only-new-issues: true
